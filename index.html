<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Link Bio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <img class="avatar" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=400&q=80" alt="avatar">
    <h1>Имя спикера</h1>
    <p>Ссылка для TikTok bio с аналитикой.</p>

    <div class="notice">
      <b>Если открылось внутри TikTok на iPhone:</b><br>
      ⋯ → <b>Open in browser</b> / <b>Открыть в браузере</b>.
    </div>

    <a class="btn tg" href="/go/tg">Telegram</a>
    <a class="btn vk" href="/go/vk">VK</a>

    <div class="small">Логи пишутся в CSV-файл events.csv.</div>
  </main>
