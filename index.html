<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Link Bio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <img class="avatar" src="photo.jpg" alt="Моё фото">
    <div class="badge">LINK IN BIO</div>
    <h1>Имя спикера</h1>
    <p>Короткая подпись о тебе: продюсер, студент и AI-специалист.</p>

    <div class="notice">
      <b>Если открылось внутри TikTok на iPhone:</b><br>
      ⋯ → <b>Open in browser</b> / <b>Открыть в браузере</b>.
    </div>

    <div class="buttons">
      <a class="btn tg" href="/go/tg">Telegram</a>
      <a class="btn vk" href="/go/vk">VK</a>
    </div>

    <div class="small">Логи пишутся в CSV-файл events.csv.</div>
  </main>
</body>
</html>
